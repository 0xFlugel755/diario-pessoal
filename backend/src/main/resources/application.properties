spring.application.name=diario-pessoal-backend

# ------------------------------------------------------------
# Banco de dados MySQL
# ------------------------------------------------------------
spring.datasource.url=mysql://avnadmin:AVNS_gdXJ0H26Hu7gH6PoLUe@mysql-2c0f19fa-caiofelixmaia-6c16.d.aivencloud.com:23083/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# ------------------------------------------------------------
# JWT
# ------------------------------------------------------------
# Gere um valor forte, por exemplo: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:troque-esta-chave-por-uma-secreta-de-producao-com-64-bytes-no-minimo}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ------------------------------------------------------------
# Upload de mídias (Cloudinary) - apenas URLs sao salvas no banco
# ------------------------------------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ------------------------------------------------------------
# Servidor
# ------------------------------------------------------------
server.port=${PORT:8080}
server.error.include-message=always

# ------------------------------------------------------------
# Actuator (para health check em produção)
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health
