<div class="rounded-3xl bg-white shadow-lg border border-purple-100 p-6">

  <div class="flex items-center justify-between mb-5">
    <h2 class="text-xl font-semibold text-purple-700">🛡️ Monitoramento de Acessos</h2>
    <span class="flex items-center gap-2 text-xs"
          [class.text-green-500]="websocketService.conectado()"
          [class.text-red-400]="!websocketService.conectado()">
      <span class="w-2 h-2 rounded-full"
            [class.bg-green-400]="websocketService.conectado()"
            [class.bg-red-300]="!websocketService.conectado()"></span>
      {{ websocketService.conectado() ? 'Ao vivo' : 'Desconectado' }}
    </span>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-purple-400 border-b border-purple-100">
          <th class="py-2 pr-4">Usuário</th>
          <th class="py-2 pr-4">Nome</th>
          <th class="py-2 pr-4">IP</th>
          <th class="py-2 pr-4">Status</th>
          <th class="py-2 pr-4">Data/Hora</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of logsCombinados" class="border-b border-purple-50 hover:bg-purple-50/50">
          <td class="py-2 pr-4 font-medium text-purple-700">{{ log.username }}</td>
          <td class="py-2 pr-4 text-purple-500">{{ log.nome || '-' }}</td>
          <td class="py-2 pr-4 text-purple-500">{{ log.ipOrigem }}</td>
          <td class="py-2 pr-4">
            <span class="px-2 py-0.5 rounded-full text-xs"
                  [class.bg-green-100]="log.status === 'SUCESSO'"
                  [class.text-green-600]="log.status === 'SUCESSO'"
                  [class.bg-red-100]="log.status === 'FALHA'"
                  [class.text-red-500]="log.status === 'FALHA'">
              {{ log.status }}
            </span>
          </td>
          <td class="py-2 pr-4 text-purple-400">{{ log.timestampLog | date:'dd/MM/yyyy HH:mm:ss' }}</td>
        </tr>
        <tr *ngIf="!logsCombinados.length">
          <td colspan="5" class="py-6 text-center text-purple-300">Nenhum acesso registrado ainda.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
