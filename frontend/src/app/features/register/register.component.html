<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-100 via-purple-50 to-pink-50 px-4">
  <div class="w-full max-w-sm bg-white/90 rounded-3xl shadow-xl shadow-purple-100 p-8 border border-pink-100">

    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🌸</div>
      <h1 class="text-2xl font-semibold text-purple-700">Criar Conta</h1>
      <p class="text-sm text-purple-300 mt-1">Comece seu diário pessoal agora</p>
    </div>

    <form (ngSubmit)="registrar()" class="space-y-3">
      <div>
        <label class="text-sm text-purple-500 mb-1 block">Nome</label>
        <input [(ngModel)]="nome" name="nome" type="text" required
               class="w-full rounded-xl border border-pink-100 bg-pink-50/50 px-4 py-2.5 text-purple-700
                      focus:outline-none focus:ring-2 focus:ring-pink-200" />
      </div>

      <div>
        <label class="text-sm text-purple-500 mb-1 block">Usuário</label>
        <input [(ngModel)]="username" name="username" type="text" required minlength="3"
               class="w-full rounded-xl border border-pink-100 bg-pink-50/50 px-4 py-2.5 text-purple-700
                      focus:outline-none focus:ring-2 focus:ring-pink-200" />
      </div>

      <div>
        <label class="text-sm text-purple-500 mb-1 block">E-mail</label>
        <input [(ngModel)]="email" name="email" type="email" required
               class="w-full rounded-xl border border-pink-100 bg-pink-50/50 px-4 py-2.5 text-purple-700
                      focus:outline-none focus:ring-2 focus:ring-pink-200" />
      </div>

      <div>
        <label class="text-sm text-purple-500 mb-1 block">Senha</label>
        <input [(ngModel)]="senha" name="senha" type="password" required minlength="8"
               class="w-full rounded-xl border border-pink-100 bg-pink-50/50 px-4 py-2.5 text-purple-700
                      focus:outline-none focus:ring-2 focus:ring-pink-200" />
      </div>

      <p *ngIf="mensagemErro" class="text-sm text-red-400">{{ mensagemErro }}</p>
      <p *ngIf="mensagemSucesso" class="text-sm text-green-500">{{ mensagemSucesso }}</p>

      <button type="submit" [disabled]="carregando"
              class="w-full py-2.5 rounded-full bg-gradient-to-r from-pink-300 to-purple-300 text-white font-medium
                     shadow-md shadow-pink-200 hover:opacity-90 transition disabled:opacity-50 mt-2">
        {{ carregando ? 'Criando...' : 'Criar conta' }}
      </button>
    </form>

    <p class="text-center text-sm text-purple-400 mt-5">
      Já tem conta?
      <a routerLink="/login" class="text-purple-600 font-medium hover:underline">Entrar</a>
    </p>
  </div>
</div>
